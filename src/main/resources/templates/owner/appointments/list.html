<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{owner/layout}">
<head>
    <title>Quản lý Lịch Hẹn</title>
</head>
<body>
<div layout:fragment="content">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Quản Lý Lịch Hẹn</h2>
        <p class="text-gray-500">Xem và duyệt các yêu cầu xem phòng từ người thuê.</p>
    </div>

    <div class="glass rounded-2xl overflow-hidden shadow-sm border border-white/50">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-gray-50/50 border-b border-gray-200 text-gray-600 text-sm uppercase tracking-wider">
                <th class="p-4 font-semibold text-center w-16">ID</th>
                <th class="p-4 font-semibold">Người Thuê</th>
                <th class="p-4 font-semibold">Phòng</th>
                <th class="p-4 font-semibold">Thời Gian Hẹn</th>
                <th class="p-4 font-semibold">Trạng Thái</th>
                <th class="p-4 font-semibold text-center w-56">Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(appointments)}">
                <td colspan="6" class="p-8 text-center text-gray-500">
                    Chưa có lịch hẹn nào.
                </td>
            </tr>
            <tr th:each="apt : ${appointments}" class="border-b border-gray-100 hover:bg-white/40 transition">
                <td class="p-4 text-center text-gray-500" th:text="${apt.id}">1</td>
                <td class="p-4 font-medium text-gray-800" th:text="${apt.tenant.username}">Nguyen Van A</td>
                <td class="p-4 text-gray-600" th:text="${apt.room.title}">Phòng Trọ 1</td>
                <td class="p-4 text-gray-600" th:text="${#temporals.format(apt.appointmentDate, 'dd/MM/yyyy HH:mm')}">20/10/2023 15:00</td>
                <td class="p-4">
                    <span th:if="${apt.status.name() == 'PENDING'}" class="px-3 py-1 rounded-full text-xs font-semibold bg-yellow-100 text-yellow-700">Chờ Duyệt</span>
                    <span th:if="${apt.status.name() == 'APPROVED'}" class="px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">Đã Duyệt</span>
                    <span th:if="${apt.status.name() == 'REJECTED'}" class="px-3 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-700">Từ Chối</span>
                    <span th:if="${apt.status.name() == 'COMPLETED'}" class="px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700">Hoàn Thành</span>
                </td>
                <td class="p-4 text-center">
                    <div class="flex justify-center space-x-2" th:if="${apt.status.name() == 'PENDING'}">
                        <form th:action="@{/owner/appointments/approve/{id}(id=${apt.id})}" method="post">
                            <button type="submit" class="px-3 py-1.5 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 transition">Duyệt</button>
                        </form>
                        <form th:action="@{/owner/appointments/reject/{id}(id=${apt.id})}" method="post" class="flex items-center space-x-2">
                            <input type="hidden" name="reason" value="Chủ trọ bận">
                            <button type="submit" class="px-3 py-1.5 bg-red-600 text-white text-sm rounded-lg hover:bg-red-700 transition">Từ chối</button>
                        </form>
                    </div>
                    <div th:if="${apt.status.name() == 'APPROVED'}">
                        <form th:action="@{/owner/appointments/complete/{id}(id=${apt.id})}" method="post">
                            <button type="submit" class="px-3 py-1.5 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700 transition">Đã Xong</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
