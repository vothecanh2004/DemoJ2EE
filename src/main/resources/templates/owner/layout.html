<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Portal - Quản lý Trọ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-green-100 min-h-screen font-sans text-gray-800">

<div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 glass shadow-xl flex flex-col z-20">
        <div class="h-16 flex items-center justify-center border-b border-green-200">
            <h1 class="text-2xl font-bold tracking-wider text-green-700">Q.L.N.T</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-2 px-4">
                <li>
                    <a th:href="@{/owner/dashboard}" class="flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-green-100 text-green-800 transition-colors">
                        <i class="fas fa-home w-5"></i>
                        <span class="font-medium">Tổng quan</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/owner/rooms}" class="flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-green-100 text-green-800 transition-colors">
                        <i class="fas fa-door-open w-5"></i>
                        <span class="font-medium">Quản lý Phòng</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/owner/appointments}" class="flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-green-100 text-green-800 transition-colors">
                        <i class="fas fa-calendar-alt w-5"></i>
                        <span class="font-medium">Lịch Hẹn</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/owner/contracts}" class="flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-green-100 text-green-800 transition-colors">
                        <i class="fas fa-file-contract w-5"></i>
                        <span class="font-medium">Hợp Đồng</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/owner/interactions/posts}" class="flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-green-100 text-green-800 transition-colors">
                        <i class="fas fa-newspaper w-5"></i>
                        <span class="font-medium">Bài Đăng</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/chat}" class="flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-green-100 text-green-800 transition-colors">
                        <i class="fas fa-comments w-5"></i>
                        <span class="font-medium">Tin Nhắn</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="p-4 border-t border-green-200">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="w-full flex items-center justify-center space-x-2 px-4 py-3 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 transition duration-300">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="font-medium">Đăng xuất</span>
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <!-- Top bar -->
        <header class="h-16 glass flex items-center justify-between px-8 z-10 shadow-sm">
            <div class="flex items-center">
                <!-- Mobile menu button (optional) -->
                <button class="md:hidden text-green-700 hover:text-green-900 focus:outline-none focus:text-green-900">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </div>
            <div class="flex items-center space-x-4">
                <a th:href="@{/owner/profile}" class="flex items-center space-x-2 text-green-800 hover:text-green-600 transition">
                    <div class="w-8 h-8 rounded-full bg-green-200 flex items-center justify-center text-green-700 font-bold">
                        <i class="fas fa-user"></i>
                    </div>
                    <span class="font-medium" th:text="${username}">Owner Name</span>
                </a>
            </div>
        </header>

        <!-- Page Content -->
        <div class="flex-1 overflow-y-auto p-8 relative z-0" id="main-scroll-container">
            <div layout:fragment="content">
                <!-- Dynamic Content Injected Here -->
            </div>
        </div>
    </main>
</div>

</body>
</html>
