<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{owner/layout}">
<head>
    <title>Hồ Sơ Của Tôi</title>
</head>
<body>
<div layout:fragment="content" class="max-w-2xl mx-auto">
    <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-800">Thông Tin Cá Nhân</h2>
        <p class="text-gray-500">Cập nhật thông tin liên hệ của bạn để khách hàng dễ dàng tìm thấy.</p>
    </div>

    <div class="glass p-8 rounded-2xl shadow-sm border border-white/50 bg-white/70">
        <div th:if="${param.success}" class="mb-6 p-4 bg-green-100 text-green-700 rounded-xl border border-green-200 text-sm font-medium">
            <i class="fas fa-check-circle mr-2"></i> Cập nhật thông tin thành công!
        </div>

        <form th:action="@{/owner/profile/update}" method="post" th:object="${user}" class="space-y-6">
            <input type="hidden" th:field="*{id}">
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Tên Đăng Nhập (Không thể đổi)</label>
                <input type="text" th:field="*{username}" disabled class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 text-gray-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Họ và Tên</label>
                <input type="text" th:field="*{fullName}" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none transition">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Số Điện Thoại</label>
                    <input type="text" th:field="*{phone}" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
                    <input type="email" th:field="*{email}" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none transition">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-4 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 shadow-lg shadow-green-100 transition transform hover:-translate-y-1">
                    Lưu Thay Đổi
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
