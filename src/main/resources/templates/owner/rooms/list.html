<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{owner/layout}">
<head>
    <title>Quản lý Phòng</title>
</head>
<body>
<div layout:fragment="content">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">Danh Sách Phòng Của Bạn</h2>
            <p class="text-gray-500">Quản lý các phòng bạn đang cho thuê trên hệ thống.</p>
        </div>
        <a th:href="@{/owner/rooms/add}" class="px-5 py-2.5 bg-green-600 text-white font-medium rounded-xl hover:bg-green-700 shadow-md">
            <i class="fas fa-plus mr-2"></i> Đăng Bài Phòng Trọ
        </a>
    </div>

    <div class="glass rounded-2xl overflow-hidden shadow-sm border border-white/50">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-gray-50/50 border-b border-gray-200 text-gray-600 text-sm uppercase tracking-wider">
                <th class="p-4 font-semibold text-center w-16">ID</th>
                <th class="p-4 font-semibold">Tên Phòng</th>
                <th class="p-4 font-semibold">Giá (VNĐ)</th>
                <th class="p-4 font-semibold">Diện Tích</th>
                <th class="p-4 font-semibold">Trạng Thái Thuê</th>
                <th class="p-4 font-semibold">Kiểm Duyệt</th>
                <th class="p-4 font-semibold text-center w-40">Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(rooms)}">
                <td colspan="7" class="p-8 text-center text-gray-500">
                    Bạn chưa có phòng nào. Hãy thêm phòng mới!
                </td>
            </tr>
            <tr th:each="room : ${rooms}" class="border-b border-gray-100 hover:bg-white/40 transition">
                <td class="p-4 text-center text-gray-500" th:text="${room.id}">1</td>
                <td class="p-4 font-medium text-gray-800" th:text="${room.title}">Phòng Trọ Rộng Rãi</td>
                <td class="p-4 text-green-600 font-semibold" th:text="${#numbers.formatDecimal(room.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">2,000,000 đ</td>
                <td class="p-4 text-gray-600" th:text="${room.area} + ' m2'">20 m2</td>
                <td class="p-4">
                    <span th:if="${room.status.name() == 'AVAILABLE'}" class="px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">Trống</span>
                    <span th:if="${room.status.name() == 'RENTED'}" class="px-3 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-700">Đã Thuê</span>
                </td>
                <td class="p-4">
                    <span th:if="${room.approvalStatus.name() == 'PENDING'}" class="px-3 py-1 rounded-full text-xs font-semibold bg-yellow-100 text-yellow-700"><i class="fas fa-clock mr-1"></i> Chờ Duyệt</span>
                    <span th:if="${room.approvalStatus.name() == 'APPROVED'}" class="px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700"><i class="fas fa-check mr-1"></i> Đã Duyệt</span>
                    <span th:if="${room.approvalStatus.name() == 'REJECTED'}" class="px-3 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-700"><i class="fas fa-times mr-1"></i> Từ Chối</span>
                    <span th:if="${room.approvalStatus.name() == 'HIDDEN'}" class="px-3 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-700"><i class="fas fa-eye-slash mr-1"></i> Đã Ẩn</span>
                </td>
                <td class="p-4 text-center">
                    <div class="flex justify-center space-x-2">
                        <a th:href="@{/owner/rooms/edit/{id}(id=${room.id})}" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition" title="Sửa">
                            <i class="fas fa-edit"></i>
                        </a>
                        <form th:action="@{/owner/rooms/delete/{id}(id=${room.id})}" method="post" class="inline" onsubmit="return confirm('Bạn có chắc chắn muốn xóa phòng này?');">
                            <button type="submit" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition" title="Xóa">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
