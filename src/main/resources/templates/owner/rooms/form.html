<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{owner/layout}">
<head>
    <title th:text="${room.id == null ? 'Thêm Phòng Mới' : 'Sửa Phòng'}">Thêm/Sửa Phòng</title>
</head>
<body>
<div layout:fragment="content">
    <div class="mb-6 flex items-center">
        <a th:href="@{/owner/rooms}" class="mr-4 w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-500 hover:text-green-600 transition">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <h2 class="text-2xl font-bold text-gray-800" th:text="${room.id == null ? 'Thêm Phòng Mới' : 'Sửa Thông Tin Phòng'}">Thêm Phòng</h2>
            <p class="text-gray-500">Vui lòng điền đầy đủ và chính xác thông tin phòng trọ.</p>
        </div>
    </div>

    <div class="glass p-8 rounded-2xl shadow-sm border border-white/50 max-w-3xl">
        <form th:action="${room.id == null ? '/owner/rooms/add' : '/owner/rooms/edit/' + room.id}" 
              th:object="${room}" method="post" enctype="multipart/form-data" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Tiêu đề -->
                <div class="col-span-1 md:col-span-2">
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-2">Tiêu đề bài đăng <span class="text-red-500">*</span></label>
                    <input type="text" id="title" th:field="*{title}" required placeholder="VD: Phòng trọ khép kín gần ĐH ABC"
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition bg-white/50">
                </div>

                <!-- Giá thuê -->
                <div>
                    <label for="price" class="block text-sm font-medium text-gray-700 mb-2">Giá cho thuê (VNĐ/Tháng) <span class="text-red-500">*</span></label>
                    <input type="number" id="price" th:field="*{price}" required min="0" step="10000" placeholder="VD: 2500000"
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition bg-white/50">
                </div>

                <!-- Diện tích -->
                <div>
                    <label for="area" class="block text-sm font-medium text-gray-700 mb-2">Diện tích (m²) <span class="text-red-500">*</span></label>
                    <input type="number" id="area" th:field="*{area}" required min="1" step="0.1" placeholder="VD: 20"
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition bg-white/50">
                </div>

                <!-- Địa chỉ -->
                <div class="col-span-1 md:col-span-2">
                    <label for="address" class="block text-sm font-medium text-gray-700 mb-2">Địa chỉ cụ thể <span class="text-red-500">*</span></label>
                    <input type="text" id="address" th:field="*{address}" required placeholder="Số nhà, ngõ, đường, phường/xã, quận/huyện..."
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition bg-white/50">
                </div>

                <!-- Mô tả -->
                <div class="col-span-1 md:col-span-2">
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Mô tả chi tiết</label>
                    <textarea id="description" th:field="*{description}" rows="5" placeholder="Mô tả về tiện ích, an ninh, gác lửng, chỗ để xe..."
                              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition bg-white/50"></textarea>
                </div>

                <!-- Hình ảnh -->
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Hình ảnh phòng trọ</label>
                    <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-xl hover:border-green-400 transition">
                        <div class="space-y-1 text-center">
                            <i class="fas fa-image text-gray-400 text-3xl mb-3"></i>
                            <div class="flex text-sm text-gray-600">
                                <label for="imageFile" class="relative cursor-pointer bg-white rounded-md font-medium text-green-600 hover:text-green-500">
                                    <span>Tải ảnh lên</span>
                                    <input id="imageFile" name="imageFile" type="file" class="sr-only" accept="image/*">
                                </label>
                                <p class="pl-1">hoặc kéo thả vào đây</p>
                            </div>
                            <p class="text-xs text-gray-500">PNG, JPG, GIF lên đến 10MB</p>
                            
                            <!-- Preview if exists -->
                            <div th:if="${room.imageUrl != null}" class="mt-4">
                                <p class="text-xs font-semibold text-gray-400 mb-2">Ảnh hiện tại:</p>
                                <img th:src="${room.imageUrl}" class="h-24 w-auto mx-auto rounded-lg shadow-sm border border-gray-200">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-4 flex justify-end">
                <button type="submit" class="px-8 py-3 bg-green-600 text-white font-medium rounded-xl hover:bg-green-700 shadow-lg shadow-green-200 transition">
                    <i class="fas fa-save mr-2"></i> Lưu Thông Tin
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
