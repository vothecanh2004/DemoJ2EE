<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Hệ Thống QLNT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 to-indigo-100 min-h-screen font-sans text-gray-800">

<div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 glass shadow-2xl flex flex-col z-20">
        <div class="h-20 flex items-center justify-center border-b border-indigo-200">
            <h1 class="text-3xl font-black tracking-widest text-indigo-800 uppercase">Q.L.N.T</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-6">
            <ul class="space-y-3 px-4">
                <li>
                    <a th:href="@{/admin/dashboard}" class="flex items-center space-x-3 px-4 py-3.5 rounded-2xl hover:bg-indigo-100 text-indigo-900 transition-all font-semibold">
                        <i class="fas fa-chart-pie w-6 text-indigo-600 border-indigo-200"></i>
                        <span>Thống Kê</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/users}" class="flex items-center space-x-3 px-4 py-3.5 rounded-2xl hover:bg-indigo-100 text-indigo-900 transition-all font-semibold">
                        <i class="fas fa-users w-6 text-indigo-600"></i>
                        <span>Người Dùng</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/rooms}" class="flex items-center space-x-3 px-4 py-3.5 rounded-2xl hover:bg-indigo-100 text-indigo-900 transition-all font-semibold">
                        <i class="fas fa-house-user w-6 text-indigo-600"></i>
                        <span>Kiểm Duyệt Phòng</span>
                    </a>
                </li>
                <!-- Removed Lịch Hẹn and Hợp Đồng as requested -->
                <li>
                    <a th:href="@{/admin/interactions/posts}" class="flex items-center space-x-3 px-4 py-3.5 rounded-2xl hover:bg-indigo-100 text-indigo-900 transition-all font-semibold">
                        <i class="fas fa-shield-alt w-6 text-indigo-600"></i>
                        <span>Nội Dung (Posts)</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="p-6 border-t border-indigo-200">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="w-full flex items-center justify-center space-x-2 px-4 py-3 bg-red-100/80 text-red-600 font-bold rounded-2xl hover:bg-red-200 hover:shadow-md transition-all">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Thoát</span>
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <!-- Top header bar -->
        <header class="h-20 glass flex items-center justify-between px-8 z-10 shadow-sm border-b border-white/40">
            <div class="flex items-center">
                <span class="text-xl font-bold text-indigo-900 tracking-wide">Xin chào, Quản trị viên</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white shadow-lg border-2 border-white">
                    <i class="fas fa-user-shield"></i>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 relative z-0">
            <!-- Global Feedback Alerts -->
            <div th:if="${success}" class="mb-6 p-4 bg-emerald-100 border border-emerald-200 text-emerald-800 rounded-2xl flex items-center shadow-sm animate-bounce">
                <i class="fas fa-check-circle mr-3 text-xl"></i>
                <span class="font-bold" th:text="${success}">Thông báo thành công</span>
            </div>
            <div th:if="${error}" class="mb-6 p-4 bg-red-100 border border-red-200 text-red-800 rounded-2xl flex items-center shadow-sm">
                <i class="fas fa-exclamation-circle mr-3 text-xl"></i>
                <span class="font-bold" th:text="${error}">Thông báo lỗi</span>
            </div>

            <div layout:fragment="content">
                <!-- Dynamic Content Injected Here -->
            </div>
        </div>
    </main>
</div>

</body>
</html>
