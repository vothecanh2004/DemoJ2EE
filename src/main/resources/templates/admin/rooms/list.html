<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layout}">
<head>
    <title>Phê Duyệt Phòng Trọ</title>
</head>
<body>
<div layout:fragment="content">
    <div class="mb-8">
        <h2 class="text-3xl font-extrabold text-indigo-900 mb-2">Quản Lý Danh Sách Phòng</h2>
        <p class="text-indigo-600/80 font-medium">Danh sách toàn bộ các phòng trên hệ thống. Duyệt phòng chờ xuất bản hoặc ẩn phòng vi phạm.</p>
    </div>

    <div class="glass rounded-3xl overflow-hidden shadow-lg border border-white/50">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-indigo-50/50 border-b border-indigo-100 text-indigo-900 text-sm uppercase tracking-wider">
                <th class="p-5 font-bold text-center w-16">ID</th>
                <th class="p-5 font-bold text-center">Chủ Trọ</th>
                <th class="p-5 font-bold">Tiêu Đề</th>
                <th class="p-5 font-bold">Giá Thuê</th>
                <th class="p-5 font-bold">Khu Vực</th>
                <th class="p-5 font-bold text-center">Trạng Thái</th>
                <th class="p-5 font-bold text-center w-56">Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(rooms)}">
                <td colspan="7" class="p-10 text-center text-gray-500 font-medium">
                    <i class="fas fa-check-double text-4xl mb-4 text-gray-300 block"></i>
                    Không có phòng nào trên hệ thống.
                </td>
            </tr>
            <tr th:each="room : ${rooms}" class="border-b border-indigo-50 hover:bg-white/60 transition">
                <td class="p-5 text-center text-gray-500 font-medium" th:text="${room.id}">1</td>
                <td class="p-5 text-center text-indigo-700 font-bold" th:text="${room.owner.username}">Owner</td>
                <td class="p-5 text-gray-800 font-medium" th:text="${room.title}">Mô tả phòng</td>
                <td class="p-5 font-bold text-green-600"><span th:text="${#numbers.formatDecimal(room.price, 0, 'COMMA', 0, 'POINT')}"></span> đ</td>
                <td class="p-5 text-gray-600 truncate max-w-xs" th:text="${room.address}">Quận 1</td>
                
                <td class="p-5 text-center">
                    <span th:if="${room.approvalStatus.name() == 'PENDING'}" class="px-3 py-1 bg-yellow-100 text-yellow-700 text-xs font-bold rounded-full shadow-sm">PENDING</span>
                    <span th:if="${room.approvalStatus.name() == 'APPROVED'}" class="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full shadow-sm">APPROVED</span>
                    <div th:if="${room.approvalStatus.name() == 'REJECTED'}" class="flex flex-col items-center">
                        <span class="px-3 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full shadow-sm mb-1">REJECTED</span>
                        <p class="text-[10px] text-red-400 italic max-w-[150px] truncate" th:title="${room.rejectionReason}" th:text="${room.rejectionReason}">Lý do...</p>
                    </div>
                    <span th:if="${room.approvalStatus.name() == 'HIDDEN'}" class="px-3 py-1 bg-gray-200 text-gray-700 text-xs font-bold rounded-full shadow-sm">HIDDEN</span>
                </td>
                
                <td class="p-5 text-center">
                    <div class="flex flex-col gap-2 items-center">
                        <div class="flex justify-center space-x-2">
                            <form th:if="${room.approvalStatus.name() == 'PENDING'}" th:action="@{/admin/rooms/approve/{id}(id=${room.id})}" method="post">
                                <button type="submit" class="px-3 py-1.5 bg-emerald-500 text-white font-bold rounded-xl shadow-md hover:bg-emerald-600 transition text-xs">
                                    <i class="fas fa-check mr-1"></i> Duyệt 
                                </button>
                            </form>
                            <form th:if="${room.approvalStatus.name() == 'APPROVED'}" th:action="@{/admin/rooms/hide/{id}(id=${room.id})}" method="post">
                                <button type="submit" class="px-3 py-1.5 bg-gray-500 text-white font-bold rounded-xl shadow-md hover:bg-gray-600 transition text-xs">
                                    <i class="fas fa-eye-slash mr-1"></i> Ẩn
                                </button>
                            </form>
                        </div>
                        
                        <form th:if="${room.approvalStatus.name() == 'PENDING'}" th:action="@{/admin/rooms/reject/{id}(id=${room.id})}" method="post" class="w-full flex gap-1">
                            <input type="text" name="reason" placeholder="Lý do từ chối..." required
                                   class="text-[10px] px-2 py-1 border border-orange-200 rounded-lg focus:ring-1 focus:ring-orange-500 outline-none w-32 shadow-sm">
                            <button type="submit" class="px-2 py-1 bg-orange-500 text-white font-bold rounded-lg shadow-sm hover:bg-orange-600 transition text-[10px]">
                                <i class="fas fa-times"></i>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
