<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layout}">
<head>
    <title>Quản Lý Người Dùng</title>
</head>
<body>
<div layout:fragment="content">
    
    <div class="mb-8">
        <h2 class="text-3xl font-extrabold text-indigo-900 mb-2">Quản Lý Người Dùng</h2>
        <p class="text-indigo-600/80 font-medium">Theo dõi và quản lý tài khoản của User và Owner.</p>
    </div>

    <div class="glass rounded-3xl overflow-hidden shadow-lg border border-white/50">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-indigo-50/50 border-b border-indigo-100 text-indigo-900 text-sm uppercase tracking-wider">
                <th class="p-5 font-bold text-center w-16">ID</th>
                <th class="p-5 font-bold">Tài Khoản</th>
                <th class="p-5 font-bold">Vai Trò</th>
                <th class="p-5 font-bold">Email</th>
                <th class="p-5 font-bold">SĐT</th>
                <th class="p-5 font-bold">Trạng Thái</th>
                <th class="p-5 font-bold text-center">Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}" class="border-b border-indigo-50 hover:bg-white/60 transition">
                <td class="p-5 text-center text-gray-500 font-medium" th:text="${user.id}">1</td>
                <td class="p-5 font-bold text-indigo-900" th:text="${user.username}">username</td>
                <td class="p-5">
                    <span th:if="${user.role.name() == 'ADMIN'}" class="px-3 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full">ADMIN</span>
                    <span th:if="${user.role.name() == 'OWNER'}" class="px-3 py-1 bg-purple-100 text-purple-700 text-xs font-bold rounded-full">OWNER</span>
                    <span th:if="${user.role.name() == 'USER'}" class="px-3 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded-full">USER</span>
                </td>
                <td class="p-5 text-gray-600 font-medium" th:text="${user.email}">email@test.com</td>
                <td class="p-5 text-gray-600 font-medium" th:text="${user.phone}">0123456789</td>
                <td class="p-5">
                    <span th:if="${user.enabled}" class="px-3 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-full"><i class="fas fa-check-circle mr-1"></i> ACTIVE</span>
                    <span th:unless="${user.enabled}" class="px-3 py-1 bg-gray-200 text-gray-700 text-xs font-bold rounded-full"><i class="fas fa-lock mr-1"></i> LOCKED</span>
                </td>
                <td class="p-5 text-center">
                    <form th:if="${user.role.name() != 'ADMIN'}" th:action="@{/admin/users/toggle/{id}(id=${user.id})}" method="post">
                        <button type="submit" th:classappend="${user.enabled} ? 'bg-red-50 text-red-600 hover:bg-red-100 border-red-200' : 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100 border-emerald-200'" class="px-4 py-2 border rounded-xl text-sm font-bold shadow-sm transition">
                            <span th:if="${user.enabled}"><i class="fas fa-ban mr-1"></i> Khóa</span>
                            <span th:unless="${user.enabled}"><i class="fas fa-unlock mr-1"></i> Mở</span>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
