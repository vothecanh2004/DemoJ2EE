<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{user/layout}">
<head>
    <title>Trang Cá Nhân</title>
</head>
<body>
<div layout:fragment="content" class="max-w-2xl mx-auto">
    <div class="mb-8 text-center">
        <h2 class="text-3xl font-extrabold text-blue-900">Trang Cá Nhân</h2>
        <p class="text-blue-600/80 mt-2 font-medium">Quản lý và cập nhật thông tin tài khoản của bạn.</p>
    </div>

    <div th:if="${param.success}" class="mb-6 p-4 bg-green-100 text-green-700 rounded-xl flex items-center shadow-sm border border-green-200">
        <i class="fas fa-check-circle mr-3 text-xl"></i> Cập nhật thông tin thành công!
    </div>

    <div class="glass p-8 rounded-3xl shadow-lg border border-white/50 relative overflow-hidden">
        <div class="absolute top-0 right-0 p-8 opacity-10">
            <i class="fas fa-id-card text-9xl text-blue-900"></i>
        </div>
        
        <form th:action="@{/user/profile/update}" th:object="${user}" method="post" class="relative z-10 space-y-6">
            
            <div class="flex items-center space-x-6 mb-8 border-b border-gray-200/50 pb-8">
                <div class="w-24 h-24 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center text-white font-bold text-4xl shadow-inner border-4 border-white">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <h3 class="text-2xl font-bold text-gray-800" th:text="*{username}">Username</h3>
                    <p class="text-blue-600 font-medium px-3 py-1 bg-blue-50 rounded-full inline-block mt-2 text-sm border border-blue-100">
                        <i class="fas fa-user-tag mr-1"></i> Người Thuê Trọ
                    </p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-gray-700 tracking-wide">Họ và Tên</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-blue-500">
                            <i class="fas fa-user-edit"></i>
                        </div>
                        <input type="text" th:field="*{fullName}" required
                               class="pl-11 w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white/70 backdrop-blur-sm outline-none transition font-medium text-gray-800">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-gray-700 tracking-wide">Số Điện Thoại</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-blue-500">
                            <i class="fas fa-phone-alt"></i>
                        </div>
                        <input type="text" th:field="*{phone}" required
                               class="pl-11 w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white/70 backdrop-blur-sm outline-none transition font-medium text-gray-800">
                    </div>
                </div>

                <div class="space-y-2 md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 tracking-wide">Email Liên Hệ</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-blue-500">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <input type="email" th:field="*{email}" required
                               class="pl-11 w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white/70 backdrop-blur-sm outline-none transition font-medium text-gray-800">
                    </div>
                </div>
            </div>

            <div class="pt-6 flex justify-end">
                <button type="submit" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition transform hover:-translate-y-0.5">
                    <i class="fas fa-save mr-2"></i> Cập Nhật Thông Tin
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
