<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{user/layout}">
<head>
    <title>Phòng Đã Lưu</title>
</head>
<body>
<div layout:fragment="content">
    
    <div class="mb-10 text-center">
        <h2 class="text-3xl font-extrabold text-blue-900 mb-2">Phòng Trọ Yêu Thích</h2>
        <p class="text-blue-600/80 font-medium">Danh sách các phòng trọ bạn đã lưu để xem sau.</p>
    </div>

    <!-- Room Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div th:if="${#lists.isEmpty(rooms)}" class="col-span-full py-16 text-center text-gray-500 glass rounded-3xl">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-300">
                <i class="fas fa-heart-broken text-4xl"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-700 mb-2">Chưa có mục nào được lưu</h3>
            <p class="mb-6 text-gray-500">Hãy tìm kiếm và lưu lại những phòng trọ ưng ý.</p>
            <a th:href="@{/user/rooms}" class="px-8 py-3 bg-blue-600 text-white font-medium rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition">Tiếp tục tìm phòng</a>
        </div>

        <div th:each="room : ${rooms}" class="glass rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition duration-300 border border-white/50 group flex flex-col relative">
            
            <form th:action="@{/user/rooms/{id}/favorite(id=${room.id})}" method="post" class="absolute top-3 right-3 z-10">
                <button type="submit" class="w-10 h-10 bg-white/90 backdrop-blur-sm rounded-full text-red-500 shadow-sm hover:bg-red-50 transition border border-red-100 flex items-center justify-center">
                    <i class="fas fa-heart"></i>
                </button>
            </form>

            <div class="relative h-48 bg-gray-200 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Room Cover" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                <div class="absolute bottom-3 left-3 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-lg text-sm font-bold text-blue-600 shadow-sm">
                    <span th:text="${#numbers.formatDecimal(room.price, 0, 'COMMA', 0, 'POINT')}"></span> đ/tháng
                </div>
            </div>
            
            <div class="p-5 flex-1 flex flex-col">
                <h3 class="text-lg font-bold text-gray-800 leading-tight line-clamp-1 mb-2" th:text="${room.title}">Tiêu đề ngắn</h3>
                
                <div class="mt-auto space-y-3">
                    <div class="grid grid-cols-2 gap-2 text-sm text-gray-600">
                        <div class="flex items-center"><i class="fas fa-map-marker-alt w-5 text-red-400"></i> <span class="truncate" th:text="${room.address}">Quận 1</span></div>
                    </div>
                    
                    <a th:href="@{/user/rooms/{id}(id=${room.id})}" class="block w-full text-center py-2.5 bg-blue-50 text-blue-700 font-medium rounded-xl hover:bg-blue-600 hover:text-white transition duration-300">
                        Xem Chi Tiết
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
